<html>
    <head>
        <style> @font-face {font-family: 'typeface'; src: url('src/typeface/typeface.ttf') format('truetype');} body{font-family: 'typeface', serif; color:#FCFCFC} a{color:#65C5F1;} h1{color:#fff45f;} h2{color:#fff45f;} input{background-color: #3D3838; color:#FCFCFC; font-family: 'facetype'};</style>
        <meta charset="utf-8">
        <title>Feedback</title>
        <link rel="icon" type="image/x-icon" href="src/ico/favicon.ico" sizes="32x32">
    </head>
</html>
<body bgcolor="#1D1B1B">
    <form accept-charset="utf-8">
    <fieldset>
        <legend>Feedback</legend>
        <label for="email">Email:</label>
        <input type="email" name="email" id="email" placeholder="Digite o seu e-mail" required>
        <br>
        <br>
        <label for="nome">Nome:</label>
        <input  type="text" placeholder="Digite seu nome" required name="nome" id="nome">
        <br><br>
        <label for="Avaliação">De uma escala de 0 a 10, o quanto você gostou do site?</label>
            <br>
            <sup>0</sup><input type="range" min="0" max="10" required id="Avaliação" name="Avaliaçâo"><sup>10</sup>
            <br><br>
            <label for="Mensagem">Quer deixar uma descrição ao seu feedback? se sim, descreva seu feedback no espaço abaixo:</label>
            <br>
            <textarea id="Mensagem" name="Mensagem" style="background-color: #3D3838;" cols="100" rows="5"></textarea>
            <br><br>    
            <label for="Bug">Encontrou algum erro no site? se sim, anexe uma captura de tela clicando no botão abaixo</label>
            <br>
            <input type="file" accept="image/*" id="bug" name="id">
            <br><br>
            <input type="submit" style="color: #FCFCFC; font-family: facetype;" id="enviar" name="enviar">
    </fieldset>
</body>
